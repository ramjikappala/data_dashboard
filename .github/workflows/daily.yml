name: Download NSE Data Daily

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 7:00 PM IST (Mon–Fri)
  workflow_dispatch:            # Run manually anytime from Actions tab

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install requests pandas openpyxl

      - name: Run NSE download script
        run: python fetch_nse.py

      - name: Save file back to repo
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "NSE data $(date +'%d-%m-%Y')"
          git push
